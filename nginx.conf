events { worker_connections 1024; }

http {
  server {
    # this is the port that Nginx container is set up to listen
    listen 80;

    location / {
      proxy_pass http://pizzatime-fe:3000;
    }

    location /api {
      proxy_set_header Host $host;
      proxy_pass http://pizzatime-be:5000;
    }
  }
}