services:
  mongo:
    image: mongo
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
  pizzatime-fe:
    image: pizzatime-fe:latest
  pizzatime-be:
    image: pizzatime-be:latest
    depends_on:
      - mongo
  nginx:
    image: nginx
    ports: 
      - 8000:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - pizzatime-fe
      - pizzatime-be

volumes:
  mongodb_data:
